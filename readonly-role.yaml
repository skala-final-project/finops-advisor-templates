AWSTemplateFormatVersion: '2010-09-09'
Description: 'FinOps Advisor - ReadOnly Cross-Account Role (MVP)'

Parameters:
  SaasAccountId:
    Type: String
    Description: FinOps Advisor SaaS AWS Account ID
    AllowedPattern: '\d{12}'

  ExternalId:
    Type: String
    Description: External ID (시스템 자동 생성값)
    MinLength: 16

Resources:
  FinOpsAdvisorReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      # RoleName 생략 (자동 생성으로 충돌 회피)
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${SaasAccountId}:root'
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess
      Tags:
        - Key: Purpose
          Value: FinOpsAdvisor

Outputs:
  RoleArn:
    Description: FinOps Advisor 화면에 붙여넣을 IAM Role ARN
    Value: !GetAtt FinOpsAdvisorReadOnlyRole.Arn