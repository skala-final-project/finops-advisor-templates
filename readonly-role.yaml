AWSTemplateFormatVersion: "2010-09-09"
Description: Read-only cross-account role for FinOps Advisor.

Parameters:
  TrustedPrincipalArn:
    Type: String
    Description: IAM user or role ARN used by the FinOps Advisor backend.

  ExternalId:
    Type: String
    Description: External ID generated by FinOps Advisor bootstrap API.

Resources:
  FinOpsAdvisorReadOnlyRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: FinOpsAdvisorReadOnlyRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref TrustedPrincipalArn
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/ReadOnlyAccess

Outputs:
  RoleArn:
    Description: Role ARN to register in FinOps Advisor.
    Value: !GetAtt FinOpsAdvisorReadOnlyRole.Arn
